# project.yml — конфигурация XcodeGen
# Генерирует LCAM.xcodeproj из этого файла
# Установка: brew install xcodegen && xcodegen generate

name: LCAM

options:
  bundleIdPrefix: com.lcam
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: false
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "5.10"
    ENABLE_BITCODE: NO
    TARGETED_DEVICE_FAMILY: "1,2"
    SUPPORTS_MACCATALYST: NO
    SWIFT_STRICT_CONCURRENCY: minimal
  configs:
    Debug:
      DEBUG_INFORMATION_FORMAT: dwarf
      SWIFT_OPTIMIZATION_LEVEL: "-Onone"
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
    Release:
      DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
      SWIFT_OPTIMIZATION_LEVEL: "-O"
      VALIDATE_PRODUCT: NO

targets:
  LCAM:
    type: application
    platform: iOS
    deploymentTarget: "17.0"

    sources:
      - path: LCAM
        excludes:
          - "**/*.md"
          - "**/.*"

    info:
      path: LCAM/Resources/Info.plist

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lcam.app
        PRODUCT_NAME: LCAM
        INFOPLIST_FILE: LCAM/Resources/Info.plist
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        CODE_SIGNING_ALLOWED: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: NO
        # Системные фреймворки — auto-linked через Swift import, без embed
        FRAMEWORK_SEARCH_PATHS: "$(inherited)"
      configs:
        Debug:
          MTL_ENABLE_DEBUG_INFO: INCLUDE_SOURCE
        Release:
          MTL_ENABLE_DEBUG_INFO: NO
          COPY_PHASE_STRIP: NO      # не стрипать при отсутствии подписи

    # Системные SDK-фреймворки — ключевое: sdk: вместо framework:
    # framework: ищет локальный файл → падает; sdk: берёт из Xcode SDK
    dependencies:
      - sdk: AVFoundation.framework
      - sdk: CoreImage.framework
      - sdk: Metal.framework
      - sdk: MetalKit.framework
      - sdk: MetalPerformanceShaders.framework
      - sdk: Vision.framework
      - sdk: Photos.framework
      - sdk: CoreLocation.framework
      - sdk: Accelerate.framework
      - sdk: CoreVideo.framework
      - sdk: CoreMedia.framework

schemes:
  LCAM:
    build:
      targets:
        LCAM: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
