# SwiftLint конфигурация для LCAM

disabled_rules:
  - line_length              # длинные строки в Metal MSL — норма
  - function_body_length     # обработчики кадров бывают длинными
  - file_length              # процессоры — большие файлы
  - type_body_length
  - force_cast               # используем в delegate-методах AVFoundation
  - todo                     # TODO-комментарии разрешены
  - multiple_closures_with_trailing_closure

opt_in_rules:
  - empty_count
  - explicit_init
  - first_where
  - sorted_imports
  - unneeded_parentheses_in_closure_argument
  - vertical_parameter_alignment_on_call

included:
  - LCAM

excluded:
  - .build
  - DerivedData
  - Pods

identifier_name:
  min_length: 1             # разрешаем i, x, y, w, h и т.п.

type_name:
  min_length: 3
