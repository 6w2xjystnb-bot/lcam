# .github/workflows/build.yml
# CI/CD: сборка LCAM + unsigned IPA

name: Build LCAM

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Package IPA
    runs-on: macos-15
    permissions:
      contents: write   # нужно для создания GitHub Releases

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.3.app
          xcodebuild -version
          xcodebuild -showsdks | grep -i ios

      - name: Install XcodeGen
        run: brew install xcodegen && xcodegen version

      - name: Generate Xcode Project
        run: xcodegen generate --spec project.yml

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/dd
          key: ${{ runner.os }}-dd-${{ hashFiles('**/*.swift', 'project.yml') }}
          restore-keys: ${{ runner.os }}-dd-

      # Сборка для реального устройства (-sdk iphoneos, -derivedDataPath задаёт путь явно)
      - name: Build for Device (arm64, unsigned)
        run: |
          xcodebuild build \
            -project LCAM.xcodeproj \
            -scheme LCAM \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath "$RUNNER_TEMP/dd" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            | xcpretty --color --simple

      # Пакуем .app из dd/Build/Products/Release-iphoneos/ → IPA
      - name: Package unsigned IPA
        run: |
          PRODUCTS="$RUNNER_TEMP/dd/Build/Products/Release-iphoneos"
          echo "=== Contents of $PRODUCTS ==="
          ls -la "$PRODUCTS" 2>/dev/null || echo "(empty or missing)"

          APP=$(find "$PRODUCTS" -maxdepth 1 -name "*.app" | head -1)

          if [ -z "$APP" ]; then
            echo "=== Full DerivedData tree ==="
            find "$RUNNER_TEMP/dd/Build/Products" -type d -name "*.app" 2>/dev/null || true
            echo "ERROR: .app not found"
            exit 1
          fi

          echo "Packaging: $APP"
          mkdir -p "$RUNNER_TEMP/ipa/Payload"
          cp -r "$APP" "$RUNNER_TEMP/ipa/Payload/"

          cd "$RUNNER_TEMP/ipa"
          zip -qr "$RUNNER_TEMP/LCAM.ipa" Payload/

          echo "=== IPA ==="
          ls -lh "$RUNNER_TEMP/LCAM.ipa"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: LCAM-unsigned-${{ github.sha }}
          path: ${{ runner.temp }}/LCAM.ipa
          retention-days: 30

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v1.0-build-$(date +'%Y%m%d-%H%M')"
          gh release create "$TAG" \
            "$RUNNER_TEMP/LCAM.ipa#LCAM.ipa" \
            --repo "$GITHUB_REPOSITORY" \
            --title "LCAM $TAG (unsigned IPA)" \
            --notes "## LCAM — Computational Camera for iPhone

          **Установка:** AltStore / Sideloadly / TrollStore
          **Требования:** iOS 17+, iPhone с Metal (iPhone 6s+)

          ### Что внутри
          - HDR+ (бёрст → Vision optical flow → Metal merge)
          - Night mode (стекинг 30 кадров + CoreImage denoising)
          - Liquid Glass UI (iOS 26)

          > Unsigned IPA — при установке через AltStore/Sideloadly потребуется Apple ID."

  lint:
    name: SwiftLint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Run SwiftLint
        run: |
          brew install swiftlint
          swiftlint lint --reporter github-actions-logging
        continue-on-error: true
