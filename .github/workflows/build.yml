# .github/workflows/build.yml
# CI/CD: сборка LCAM + ad-hoc IPA

name: Build LCAM

on:
  push:
    branches: [ main, develop, claude/* ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Package IPA
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.3.app
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen && xcodegen version

      - name: Generate Xcode Project
        run: |
          xcodegen generate --spec project.yml
          echo "=== Swift files on disk ==="
          find LCAM -name "*.swift" | sort
          echo "=== Swift files in pbxproj ==="
          grep -c "\.swift" LCAM.xcodeproj/project.pbxproj || echo "ZERO — XcodeGen did not include sources!"
          echo "=== Compile Sources phase ==="
          grep -A 40 "PBXSourcesBuildPhase" LCAM.xcodeproj/project.pbxproj | head -45

      # Кеш DerivedData ОТКЛЮЧЁН намеренно:
      # стухший llbuild-граф из старых signed-билдов вызывал
      # "Build input file cannot be found: LCAM.app/LCAM" (exit 65).
      # clean build гарантирует чистый граф зависимостей.

      - name: Build for Device (arm64, no signing)
        run: |
          set -o pipefail
          xcodebuild clean build \
            -project LCAM.xcodeproj \
            -scheme LCAM \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath "$RUNNER_TEMP/dd" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            VALIDATE_PRODUCT=NO \
            ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES=NO \
            STRIP_INSTALLED_PRODUCT=NO \
            COPY_PHASE_STRIP=NO \
            2>&1 | tee "$RUNNER_TEMP/build.log" | xcpretty --color --simple || {
              echo "=== BUILD FAILED — full log (last 300 lines) ==="
              tail -300 "$RUNNER_TEMP/build.log"
              exit 1
            }

      - name: Ad-hoc sign + Package IPA
        run: |
          PRODUCTS="$RUNNER_TEMP/dd/Build/Products/Release-iphoneos"
          APP=$(find "$PRODUCTS" -maxdepth 1 -name "*.app" | head -1)

          if [ -z "$APP" ]; then
            echo "ERROR: .app not found in $PRODUCTS"
            find "$RUNNER_TEMP/dd" -name "*.app" 2>/dev/null || true
            exit 1
          fi

          EXEC=$(defaults read "$APP/Info.plist" CFBundleExecutable 2>/dev/null || echo "LCAM")
          echo "=== App: $APP | Binary: $EXEC ==="
          ls -lah "$APP"

          if [ ! -f "$APP/$EXEC" ]; then
            echo "ERROR: binary $EXEC not found inside .app"
            exit 1
          fi

          file "$APP/$EXEC"

          # Ad-hoc подпись вручную (codesign -s -)
          # Нужна для AltStore/Sideloadly — они перепишут её своей при установке
          codesign -f -s - "$APP/$EXEC"
          codesign -f -s - "$APP"
          echo "=== Signature ==="
          codesign -dvvv "$APP" 2>&1 | head -5

          # Пакуем IPA
          mkdir -p "$RUNNER_TEMP/ipa/Payload"
          cp -r "$APP" "$RUNNER_TEMP/ipa/Payload/"
          cd "$RUNNER_TEMP/ipa"
          zip -qr "$RUNNER_TEMP/LCAM.ipa" Payload/

          echo "=== IPA contents ==="
          ls -lh "$RUNNER_TEMP/LCAM.ipa"
          unzip -l "$RUNNER_TEMP/LCAM.ipa" | grep -v "/$" | head -15

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: LCAM-adhoc-${{ github.sha }}
          path: ${{ runner.temp }}/LCAM.ipa
          retention-days: 30

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v1.0-build-$(date +'%Y%m%d-%H%M')"
          gh release create "$TAG" \
            "$RUNNER_TEMP/LCAM.ipa#LCAM.ipa" \
            --repo "$GITHUB_REPOSITORY" \
            --title "LCAM $TAG" \
            --notes "## LCAM — Computational Camera

          **Установка:** AltStore / Sideloadly (IPA с ad-hoc подписью)
          **Требования:** iOS 17+, iPhone с Metal

          - HDR+ multi-frame (Vision optical flow + Metal noise-weighted merge)
          - Night mode (30-frame stacking + CoreImage denoising)
          - Liquid Glass UI (iOS 26)"

  lint:
    name: SwiftLint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Run SwiftLint
        run: |
          brew install swiftlint
          swiftlint lint --reporter github-actions-logging
        continue-on-error: true
