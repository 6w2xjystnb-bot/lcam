# .github/workflows/build.yml
# CI/CD: сборка LCAM + генерация unsigned IPA для сайдлоадинга (AltStore / Sideloadly)

name: Build LCAM

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Package IPA
    runs-on: macos-15

    steps:
      # 1. Код
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Xcode 16
      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.3.app
          xcodebuild -version

      # 3. XcodeGen
      - name: Install XcodeGen
        run: brew install xcodegen && xcodegen version

      # 4. Генерируем .xcodeproj
      - name: Generate Xcode Project
        run: xcodegen generate --spec project.yml

      # 5. Кэш DerivedData
      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-dd-${{ hashFiles('**/*.swift', 'project.yml') }}
          restore-keys: ${{ runner.os }}-dd-

      # 6. Сборка для симулятора — проверка компиляции
      - name: Build (Simulator — compile check)
        run: |
          xcodebuild build \
            -project LCAM.xcodeproj \
            -scheme LCAM \
            -destination "generic/platform=iOS Simulator" \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            | xcpretty --color --simple
        env:
          NSUnbufferedIO: YES

      # 7. Архив для реального устройства (без подписи)
      - name: Archive for Device (unsigned)
        run: |
          xcodebuild archive \
            -project LCAM.xcodeproj \
            -scheme LCAM \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/LCAM.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            | xcpretty --color --simple

      # 8. Пакуем .app → Payload/ → LCAM.ipa
      # Unsigned IPA: устанавливается через AltStore, Sideloadly, TrollStore
      - name: Package unsigned IPA
        run: |
          ARCHIVE="$RUNNER_TEMP/LCAM.xcarchive"
          APP=$(find "$ARCHIVE/Products/Applications" -name "*.app" | head -1)

          mkdir -p "$RUNNER_TEMP/ipa/Payload"
          cp -r "$APP" "$RUNNER_TEMP/ipa/Payload/"

          cd "$RUNNER_TEMP/ipa"
          zip -qr "$RUNNER_TEMP/LCAM.ipa" Payload

          # Выводим размер
          ls -lh "$RUNNER_TEMP/LCAM.ipa"
          echo "IPA_PATH=$RUNNER_TEMP/LCAM.ipa" >> $GITHUB_ENV

      # 9. Загружаем IPA как артефакт (скачать → Releases)
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: LCAM-unsigned-${{ github.sha }}
          path: ${{ runner.temp }}/LCAM.ipa
          retention-days: 30

      # 10. Создаём GitHub Release с IPA при пуше в main
      - name: Create Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="build-$(date +'%Y%m%d-%H%M')"
          gh release create "$TAG" \
            "$RUNNER_TEMP/LCAM.ipa" \
            --repo "$GITHUB_REPOSITORY" \
            --title "LCAM $TAG (unsigned)" \
            --notes "## LCAM — Unsigned IPA

          ### Установка
          1. **AltStore** — через AltServer на Mac/Windows
          2. **Sideloadly** — [sideloadly.io](https://sideloadly.io)
          3. **TrollStore** — если устройство совместимо

          ### Что внутри
          - HDR+ многокадровая обработка (бёрст 4–30 кадров)
          - Ночной режим (стекинг + CoreImage denoising)
          - Liquid Glass UI (iOS 26)
          - Vision optical flow выравнивание
          - Metal GPU merge с моделью шума

          ### Требования
          iOS 17.0+, iPhone с поддержкой Metal

          > ⚠️ Unsigned IPA — Apple ID понадобится при установке через AltStore/Sideloadly.
          > Приложение будет работать 7 дней (бесплатный аккаунт) или постоянно (Developer аккаунт)."

  # SwiftLint
  lint:
    name: SwiftLint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Run SwiftLint
        run: |
          brew install swiftlint
          swiftlint lint --reporter github-actions-logging
        continue-on-error: true
