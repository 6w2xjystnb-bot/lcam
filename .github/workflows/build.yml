# .github/workflows/build.yml
# CI/CD: сборка LCAM + unsigned IPA для AltStore / Sideloadly

name: Build LCAM

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Package IPA
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.3.app
          xcodebuild -version
          # Показываем доступные SDK
          xcodebuild -showsdks | grep -i ios

      - name: Install XcodeGen
        run: brew install xcodegen && xcodegen version

      - name: Generate Xcode Project
        run: xcodegen generate --spec project.yml

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-dd-${{ hashFiles('**/*.swift', 'project.yml') }}
          restore-keys: ${{ runner.os }}-dd-

      # Сборка для симулятора — проверка компиляции всего кода
      - name: Build (Simulator — compile check)
        run: |
          xcodebuild build \
            -project LCAM.xcodeproj \
            -scheme LCAM \
            -destination "generic/platform=iOS Simulator" \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            | xcpretty --color --simple

      # Сборка для реального устройства через -sdk iphoneos
      # (не требует отдельно установленной platform, SDK уже в Xcode)
      - name: Build for Device (arm64, unsigned)
        run: |
          xcodebuild build \
            -project LCAM.xcodeproj \
            -scheme LCAM \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            BUILD_DIR="$RUNNER_TEMP/build" \
            | xcpretty --color --simple

      # Пакуем .app из Release-iphoneos/ → Payload/ → LCAM.ipa
      - name: Package unsigned IPA
        run: |
          BUILD_DIR="$RUNNER_TEMP/build/Release-iphoneos"
          APP=$(find "$BUILD_DIR" -maxdepth 1 -name "*.app" | head -1)

          if [ -z "$APP" ]; then
            echo "=== Build dir contents ==="
            find "$RUNNER_TEMP/build" -type d -name "*.app" || true
            echo "ERROR: .app not found in $BUILD_DIR"
            exit 1
          fi

          echo "Packaging: $APP"
          mkdir -p "$RUNNER_TEMP/ipa/Payload"
          cp -r "$APP" "$RUNNER_TEMP/ipa/Payload/"

          cd "$RUNNER_TEMP/ipa"
          zip -qr "$RUNNER_TEMP/LCAM.ipa" Payload/

          echo "=== IPA size ==="
          ls -lh "$RUNNER_TEMP/LCAM.ipa"
          echo "IPA_PATH=$RUNNER_TEMP/LCAM.ipa" >> $GITHUB_ENV

      # Загружаем IPA как артефакт (30 дней)
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: LCAM-unsigned-${{ github.sha }}
          path: ${{ runner.temp }}/LCAM.ipa
          retention-days: 30

      # GitHub Release с IPA при каждом пуше в main
      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v1.0-build-$(date +'%Y%m%d-%H%M')"
          gh release create "$TAG" \
            "$RUNNER_TEMP/LCAM.ipa#LCAM.ipa" \
            --repo "$GITHUB_REPOSITORY" \
            --title "LCAM $TAG (unsigned IPA)" \
            --notes "## LCAM — Computational Camera for iPhone

          ### Установка
          | Метод | Описание |
          |-------|----------|
          | **AltStore** | Установить через AltServer (Mac/Win). Работает 7 дней бесплатно. |
          | **Sideloadly** | [sideloadly.io](https://sideloadly.io) — GUI-инструмент |
          | **TrollStore** | Если устройство совместимо (iOS 14–16.x) |

          ### Требования
          - iPhone с поддержкой Metal (iPhone 6s+)
          - iOS 17.0+

          ### Что внутри
          - **HDR+** — бёрст 4–30 кадров → Vision optical flow выравнивание → Metal noise-weighted merge
          - **Night mode** — стекинг 30 кадров → CINoiseReduction → подъём теней
          - **Liquid Glass UI** (iOS 26) с фолбэком на iOS 17
          - Тональное отображение, цветовая матрица, Vibrance — как в GCam

          > ⚠️ Unsigned IPA — при установке через AltStore/Sideloadly потребуется Apple ID."

  lint:
    name: SwiftLint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Run SwiftLint
        run: |
          brew install swiftlint
          swiftlint lint --reporter github-actions-logging
        continue-on-error: true
